
exec-once = hyprpm reload
exec=fish -c "set -Ux COLORFILE ~/dotfiles/color_nier" && pkill -USR2 fish
exec=fish -c "set -Ux STARSHIP_CONFIG ~/dotfiles/components/starship.toml"


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 15
    gaps_out = 15
    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 1
        render_power = 1
        offset = 5 5
        color = rgba(48463d55)
        color_inactive = rgba(48463d11)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2
        noise=0.05
    }
    screen_shader = ~/dotfiles/components/gridlines.frag
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = in-out,        0.65,-0.01,    0,  0.95
    bezier = woa,             0,    0,    0,    1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = windows,        1,    2,    woa , popin
    animation = border,        1,     10,    default
    animation = fade,          1,     10,    default
    animation = workspaces,    1,     1.5,   in-out,        slide
}

plugin {
    hyprbars {
        bar_height = 25
        bar_color = rgb(48463d)
        bar_text_size = 11
        bar_text_font = FOT-Rodin Pro M
        bar_text_align = left
        col.text = rgb(c2bda6)
        hyprbars-button = rgb(48463d), 20, ◬, hyprctl dispatch killactive
        hyprbars-button = rgb(48463d), 20,▽, hyprctl dispatch fullscreen 1  
    }
}


windowrule {
  name = windowrule-1
  hyprbars:no_bar = true
  match:class = .*
}


windowrule {
  name = windowrule-2
  hyprbars:no_bar = false
  match:class = (kitty)
}


